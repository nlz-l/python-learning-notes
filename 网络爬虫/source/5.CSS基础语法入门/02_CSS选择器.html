<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        #abc{  /*id 选择器 */
            color: pink;
        }
        li{   /*标签 选择器 */
            border: 1px solid red;
        }
        .jay{ /*类 选择器 */
            color: green;
        }
        div,span{ /*分组 选择器 */
            background: hotpink;
        }
        ul li{  /* 空格 表示子子孙孙,所有后代  */
            list-style: none;
        }
        ul > li{  /* > 后代一层  */
            list-style: none;
        }
        h1 + h2{ /* > 相邻选择器  */
            color: red;
        }
        a[target]{
            color: green;
        }
        a[target="_blank"]{
            text-decoration: none;
        }
    </style>
</head>
<body>
